name: Carpooling App CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  backend-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Install dependencies
      run: |
        pip install -r requirements.txt


    - name: Run tests
      run: |
        pytest


  frontend-build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"


    - name: Install frontend dependencies
      run: |
        cd Frontend
        npm install


    - name: Build React app
      run: |
        cd Frontend
        npm run build